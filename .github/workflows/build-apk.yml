name: Generate Android APK (Capacitor Direct Build)

on:
  push:
    branches:
      - main
      - master  # main OR master branch ethula push pannaalum trigger aagum
  workflow_dispatch: # Manual build run button options-kaga

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout GitHub Repository Code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Clean Install Dependencies
      - name: Install Project Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 4. Setup Java Platform JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Build Safety Control: Web directory creation (If not present)
      # TrebEdit assets root profile default structure direct-ah sync aaga temporary 'www' block check
      - name: Web Assets Structure Directory Validation
        run: |
          if [ ! -d "www" ]; then
            mkdir www
            cp *.html www/ 2>/dev/null || true
            cp *.css www/ 2>/dev/null || true
            cp *.js www/ 2>/dev/null || true
          fi

      # 6. Fresh Android Manifest & Platform Initialization 
      # Ethendha local platform file missing-ah irundhalum Cloud-lye fresh-ah compile pannidum
      - name: Cap Android Platform Dynamic Injection
        run: |
          npx cap init "Nova AI" "com.kdblackdev.novaai" --web-dir=www
          npx cap add android || true
          npx cap sync android

      # 7. Execute Gradle Release Compiling
      - name: Build Android Release Production APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 8. Extract Manifest & Push Output File to Actions Artifacts
      - name: Upload Finished APK Deliverable
        uses: actions/upload-artifact@v4
        with:
          name: LumaAI-Cloud-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
