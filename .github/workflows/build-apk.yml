name: Generate Android APK (Capacitor Direct Build)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Manual ரன் பட்டனுக்காக

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout GitHub Repository Code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Node environment (Error cache line removed bro!)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Clean Initialize Package Settings & Dependencies
      # Lock file இல்லாததால் நாமே புதிய package.json-ஐ கிளவுடில் உருவாக்கி பில்ட் செய்கிறோம்
      - name: Initialize App Packages
        run: |
          if [ ! -f "package.json" ]; then
            npm init -y
          fi
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 4. Setup Java Platform JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Web directory creation & file sync fallback
      - name: Web Assets Structure Directory Validation
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true

      # 6. Fresh Android Manifest & Platform Initialization 
      - name: Cap Android Platform Dynamic Injection
        run: |
          npx cap init "Nova AI" "com.kdblackdev.novaai" --web-dir=www
          npx cap add android || true
          npx cap sync android

      # 7. Execute Gradle Release Compiling
      - name: Build Android Release Production APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 8. Extract Finished APK File to Actions Artifacts
      - name: Upload Finished APK Deliverable
        uses: actions/upload-artifact@v4
        with:
          name: LumaAI-Cloud-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
