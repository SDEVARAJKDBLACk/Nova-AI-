name: Generate Android APK (Capacitor)

on:
  push:
    branches:
      - main  # Entha branch-la code push panna build aaganumo athu (main/master)
  workflow_dispatch: # Intha line irundha namma manual-ah பட்டன் கிளிக் பண்ணியும் ரன் பண்ணலாம்

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Git Code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Install Dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Setup Java Environment for Android Build
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Capacitor Code Sync
      - name: Capacitor Sync
        run: |
          npx cap sync android

      # 6. Build APK via Gradle
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 7. Upload APK to GitHub Artifacts (Download Section)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumaAI-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
